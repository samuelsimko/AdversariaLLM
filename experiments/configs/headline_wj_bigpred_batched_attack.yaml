# Verify batched soft_prompt against sequential references.
#
# Re-uses the 3 trained adapters from headline_wj_bigpred_n50 and re-runs
# soft_prompt against them with batch_size=16. The sequential run.jsons are
# preserved at runs/experiments/headline_wj_bigpred_n50/<cell>/attacks/...
# so we can diff per-prompt loss/completions/ASR after this completes.

meta:
  experiment_name: headline_wj_bigpred_batched_attack
  output_root: runs/experiments

cluster: {}

runtime:
  python_bin: /workspace/AdversariaLLM/venv/bin/python
  venv_activate: /workspace/AdversariaLLM/venv/bin/activate
  env_file: .env
  num_gpus: 3
  continue_on_attack_failure: true

classifiers: ["local:strongreject"]

datasets:
  adv_behaviors_n50:
    name: adv_behaviors
    seed: 0
    shuffle: true
    idx: "list(range(0, 50))"

# Inline-defined models pointing at the existing adapters.
models:
  q_ceflr_pra_wj_adapter:
    id: Qwen/Qwen3-8B
    peft_path: /workspace/new_clone/AdversariaLLM/runs/experiments/headline_wj_bigpred_n50/q_ceflr_pra_wj/lora_adapter
  q_ceflr_no_pra_wj_adapter:
    id: Qwen/Qwen3-8B
    peft_path: /workspace/new_clone/AdversariaLLM/runs/experiments/headline_wj_bigpred_n50/q_ceflr_no_pra_wj/lora_adapter
  q_triplet_pra_wj_adapter:
    id: Qwen/Qwen3-8B
    peft_path: /workspace/new_clone/AdversariaLLM/runs/experiments/headline_wj_bigpred_n50/q_triplet_pra_wj/lora_adapter

# Reference-style defenses (no training); peft_path comes from the inline model.
defenses:
  q_ceflr_pra_wj:
    script: null
    base_model: q_ceflr_pra_wj_adapter
    output_subdir: q_ceflr_pra_wj
    attack_uses_adapter: false
  q_ceflr_no_pra_wj:
    script: null
    base_model: q_ceflr_no_pra_wj_adapter
    output_subdir: q_ceflr_no_pra_wj
    attack_uses_adapter: false
  q_triplet_pra_wj:
    script: null
    base_model: q_triplet_pra_wj_adapter
    output_subdir: q_triplet_pra_wj
    attack_uses_adapter: false

attacks:
  soft_prompt_50_batched:
    attack: soft_prompt
    dataset: adv_behaviors_n50
    attack_overrides:
      batch_size: 16

pipelines:
  q_ceflr_pra_wj:
    - { stage: attack, defense: q_ceflr_pra_wj, attacks: [soft_prompt_50_batched] }
  q_ceflr_no_pra_wj:
    - { stage: attack, defense: q_ceflr_no_pra_wj, attacks: [soft_prompt_50_batched] }
  q_triplet_pra_wj:
    - { stage: attack, defense: q_triplet_pra_wj, attacks: [soft_prompt_50_batched] }
