# WildJailbreak ablation: drop reverse-model pairs and CB-train; train on WJ only.
#
# Data substitutions vs headline_n25:
#   cb_path:           data/circuit_breakers_train.json      → data/wildjailbreak_harmful.json
#   pair_path:         reverse_model/cb_train_reverse_*.jsonl → data/wildjailbreak_pairs.jsonl
#   pair_format:       reverse                                → wildjailbreak
#   benign side:       UltraChat (5000)                       → UltraChat (5000) + WJ benign (5000) [appended]
#
# The predictor (PRA's JEPA loss) sees BOTH adversarial_harmful AND adversarial_benign
# pairs from WJ, balanced 50/50 via pair_sample_balanced=true.
#
# Cells: q_cb_pra_wj (w_jepa=5) and q_cb_no_pra_wj (w_jepa=0). Same recipe otherwise.
# Plus a small attack panel + benign eval to compare to headline_n25/q_cb_pra.

meta:
  experiment_name: ablation_wj
  output_root: runs/experiments

cluster: {}

runtime:
  num_gpus: 2
  continue_on_attack_failure: true

classifiers: ["local:strongreject"]

datasets:
  adv_behaviors_n25:
    name: adv_behaviors
    seed: 0
    shuffle: true
    idx: "list(range(0, 25))"
  jbb_behaviors_n25:
    name: jbb_behaviors
    seed: 0
    shuffle: true
    idx: "list(range(0, 25))"

models:
  q: { id: Qwen/Qwen3-8B }

common: &common
  num_max_steps: 1500
  batch_size: 4
  grad_accum: 2
  ultrachat_samples: 5000
  limit_cb: 5000
  pair_limit: 100000
  pair_sample_size: 8000
  pair_sample_balanced: true
  max_length: 256
  lr: 0.0002
  jepa_target_encoder: defended
  align_layer: 25
  predictor_type: mlp
  predictor_layers: 2
  predictor_bottleneck_dim: 256
  predictor_dropout: 0.0
  predictor_lr_multiplier: 100.0
  jepa_target: prompt_only
  report_to: wandb
  save_total_limit: 1
  logging_steps: 10
  save_steps: 1500
  lora_r: 32
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: q_proj,v_proj
  # ===== WJ-specific =====
  pair_path: data/wildjailbreak_pairs.jsonl
  pair_format: wildjailbreak
  extra_benign_path: data/wildjailbreak_benign.jsonl
  extra_benign_samples: 5000
  # =======================
  w_benign: 0.1
  w_harm: 1.0
  w_kl: 1.0
  harm_regularizer: circuit_breaker
  include_pair_harmful_in_harm_ce: true
  cb_beta_start_mult: 10.0
  cb_beta_decay_fraction: 1.0

defenses:
  q_cb_pra_wj:
    script: defenses/jepa_ce.py
    base_model: q
    output_subdir: q_cb_pra_wj
    data: { cb_path: data/wildjailbreak_harmful.json }
    train_args:
      <<: *common
      w_jepa: 5.0
  q_cb_no_pra_wj:
    script: defenses/jepa_ce.py
    base_model: q
    output_subdir: q_cb_no_pra_wj
    data: { cb_path: data/wildjailbreak_harmful.json }
    train_args:
      <<: *common
      w_jepa: 0.0

attacks:
  bon_25:         { attack: bon,         dataset: adv_behaviors_n25 }
  soft_prompt_25: { attack: soft_prompt, dataset: adv_behaviors_n25 }
  direct_25:      { attack: direct,      dataset: adv_behaviors_n25 }

benign_evals: {}

pipelines:
  q_cb_pra_wj:
    - { stage: train, defense: q_cb_pra_wj }
    - stage: attack
      defense: q_cb_pra_wj
      attacks: [direct_25, bon_25, soft_prompt_25]
  q_cb_no_pra_wj:
    - { stage: train, defense: q_cb_no_pra_wj }
    - stage: attack
      defense: q_cb_no_pra_wj
      attacks: [direct_25, bon_25, soft_prompt_25]

attack_priority: [direct_25, bon_25, soft_prompt_25]
