meta:
  experiment_name: ablation_wj_more
  output_root: runs/experiments
cluster: {}
runtime:
  num_gpus: 4
  continue_on_attack_failure: true
classifiers:
- local:strongreject
datasets:
  adv_behaviors_n25:
    name: adv_behaviors
    seed: 0
    shuffle: true
    idx: list(range(0, 25))
models:
  l:
    id: meta-llama/Meta-Llama-3-8B-Instruct
  q:
    id: Qwen/Qwen3-8B
common:
  num_max_steps: 1500
  batch_size: 4
  grad_accum: 2
  ultrachat_samples: 5000
  limit_cb: 5000
  pair_limit: 100000
  pair_sample_size: 8000
  pair_sample_balanced: true
  max_length: 256
  lr: 0.0002
  jepa_target_encoder: defended
  align_layer: 25
  predictor_type: mlp
  predictor_layers: 2
  predictor_bottleneck_dim: 256
  predictor_dropout: 0.0
  predictor_lr_multiplier: 100.0
  jepa_target: prompt_only
  report_to: wandb
  save_total_limit: 1
  logging_steps: 10
  save_steps: 1500
  lora_r: 32
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: q_proj,v_proj
  pair_path: data/wildjailbreak_pairs.jsonl
  pair_format: wildjailbreak
  extra_benign_path: data/wildjailbreak_benign.jsonl
  extra_benign_samples: 5000
  w_benign: 0.1
  w_harm: 1.0
  w_kl: 1.0
  include_pair_harmful_in_harm_ce: true
defenses:
  l_cb_pra_wj:
    script: defenses/jepa_ce.py
    base_model: l
    output_subdir: l_cb_pra_wj
    data:
      cb_path: data/wildjailbreak_harmful.json
