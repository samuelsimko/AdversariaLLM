# No-PRA matched controls for headline_pra_joint_n50.
#
# Identical to headline_pra_joint_n50.yaml in every hyperparameter EXCEPT w_jepa,
# which is 0.0 here (vs 5.0 in the PRA run). This isolates the contribution of
# the JEPA predictor-alignment term — same harm-reg, same data, same step count.
#
# Cells:
#   q_cb_no_pra_joint       Qwen3,  harm_reg=circuit_breaker, w_jepa=0
#   l_cb_no_pra_joint       Llama3, harm_reg=circuit_breaker, w_jepa=0
#   l_triplet_no_pra_joint  Llama3, harm_reg=triplet,         w_jepa=0
#
# Stages per cell: train -> soft_prompt attack on adv_behaviors_n50.

meta:
  experiment_name: headline_no_pra_joint_n50
  output_root: runs/experiments

cluster: {}

runtime:
  python_bin: /workspace/AdversariaLLM/venv/bin/python
  venv_activate: /workspace/AdversariaLLM/venv/bin/activate
  env_file: .env
  num_gpus: 2
  continue_on_attack_failure: true

classifiers: ["local:strongreject"]

datasets:
  adv_behaviors_n50:
    name: adv_behaviors
    seed: 0
    shuffle: true
    idx: "list(range(0, 50))"

models:
  l: { id: meta-llama/Meta-Llama-3-8B-Instruct }
  q: { id: Qwen/Qwen3-8B }

# Same as PRA recipe; only w_jepa differs (5.0 -> 0.0).
common: &common_train_args
  num_max_steps: 1500
  batch_size: 4
  grad_accum: 2
  ultrachat_samples: 5000
  limit_cb: 5000
  pair_limit: 100000
  pair_sample_size: 8000
  pair_sample_balanced: true
  max_length: 256
  lr: 0.0002
  jepa_target_encoder: defended
  align_layer: 30
  predictor_type: mlp
  predictor_layers: 2
  predictor_bottleneck_dim: 256
  predictor_dropout: 0.0
  predictor_lr_multiplier: 1.0
  jepa_target: prompt_only
  report_to: wandb
  save_total_limit: 1
  logging_steps: 10
  save_steps: 1500
  lora_r: 32
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: q_proj,v_proj
  pair_path: reverse_model/cb_train_reverse_prompts_5000_random_temp.jsonl
  pair_format: reverse
  w_benign: 0.1
  w_harm: 1.0
  w_kl: 1.0
  w_jepa: 0.0

defenses:
  q_cb_no_pra_joint:
    script: defenses/jepa_ce.py
    base_model: q
    output_subdir: q_cb_no_pra_joint
    data: { cb_path: data/circuit_breakers_train.json }
    train_args:
      <<: *common_train_args
      harm_regularizer: circuit_breaker
      include_pair_harmful_in_harm_ce: true
      cb_beta_start_mult: 10.0
      cb_beta_decay_fraction: 1.0

  l_cb_no_pra_joint:
    script: defenses/jepa_ce.py
    base_model: l
    output_subdir: l_cb_no_pra_joint
    data: { cb_path: data/circuit_breakers_train.json }
    train_args:
      <<: *common_train_args
      harm_regularizer: circuit_breaker
      include_pair_harmful_in_harm_ce: true
      cb_beta_start_mult: 10.0
      cb_beta_decay_fraction: 1.0

  l_triplet_no_pra_joint:
    script: defenses/jepa_ce.py
    base_model: l
    output_subdir: l_triplet_no_pra_joint
    data: { cb_path: data/circuit_breakers_train.json }
    train_args:
      <<: *common_train_args
      harm_regularizer: triplet
      include_pair_harmful_in_harm_ce: true

attacks:
  soft_prompt_50:
    attack: soft_prompt
    dataset: adv_behaviors_n50

pipelines:
  q_cb_no_pra_joint:
    - { stage: train, defense: q_cb_no_pra_joint }
    - stage: attack
      defense: q_cb_no_pra_joint
      attacks: [soft_prompt_50]

  l_cb_no_pra_joint:
    - { stage: train, defense: l_cb_no_pra_joint }
    - stage: attack
      defense: l_cb_no_pra_joint
      attacks: [soft_prompt_50]

  l_triplet_no_pra_joint:
    - { stage: train, defense: l_triplet_no_pra_joint }
    - stage: attack
      defense: l_triplet_no_pra_joint
      attacks: [soft_prompt_50]
