# Qwen3-32B: CE-floor vs Circuit-Breakers × identity vs MLP PRA (+ baseline).
#
# 5 cells:
#   q_base         unprotected Qwen3-32B baseline (no defense training)
#   q_ce_pra_id    CE-floor + JEPA identity PRA (best Apertus cell, sanity check)
#   q_ce_pra       CE-floor + JEPA MLP PRA (2 layers, bottleneck=256)
#   q_cb_pra_id    Circuit-breaker + JEPA identity PRA
#   q_cb_pra       Circuit-breaker + JEPA MLP PRA (2 layers, bottleneck=256)
#
# Attacks per cell (each on adv_behaviors[0..99] = 100 behaviors):
#   direct, prefilling, template_jailbreak (20 templates / behavior)
#
# Benign eval: mmlu (small, smoke-sized).
#
# !!! GPU MEMORY NOTE !!!
# Qwen3-32B is ~64 GB in bf16. Single 80 GB A100 is *tight* for LoRA + JEPA training:
#   weights ~64 GB + LoRA grads/opt state ~2 GB + activations (bs=1, seq=128) ~4 GB
#   + JEPA double forward overhead ~6 GB ≈ 76 GB total.
# If it OOMs, options:
#   (1) bump to 2× 80 GB A100 (set --gpus 2 in cluster section below, model auto-shards)
#   (2) drop max_length to 96 and grad_accum=16 (bs=1 stays)
#   (3) add 4-bit QLoRA support to defenses/jepa_ce.py (not currently wired)
#
# Submit:
#   python experiments/run_experiment.py \
#     --config experiments/configs/qwen3_32b_ce_cb.yaml --backend slurm

meta:
  experiment_name: qwen3_32b_ce_cb
  output_root: runs/experiments

runtime:
  python_bin: /cluster/project/schoelkopf/ssimko/AdversariaLLM/venv/bin/python
  venv_activate: sbatch/common.sh
  num_gpus: 1
  continue_on_attack_failure: true

cluster:
  partition: null
  account: ls_schoel
  gpus: "nvidia_a100_80gb_pcie:1"
  gres: "gpumem:80g"
  # Per-stage gres: 32B inference attacks need 80g too (vs 8B which fits in 40g).
  gres_train: "gpumem:80g"
  gres_attack: "gpumem:80g"
  gres_benign: "gpumem:80g"
  constraint: cuda12
  cpus_per_task: 8
  mem_per_cpu: 12G
  time_train: "06:00:00"     # 32B training is ~3-4× slower than 8B; budget headroom
  time_attack: "06:00:00"
  time_benign: "02:00:00"

classifiers: ["local:strongreject"]

datasets:
  adv_behaviors_n100:
    name: adv_behaviors
    seed: 0
    shuffle: true
    idx: "list(range(0, 100))"

models:
  qwen3_32b:
    id: Qwen/Qwen3-32B
    tokenizer_id: Qwen/Qwen3-32B
    short_name: qwen3-32b
    developer_name: Qwen
    compile: false
    dtype: bfloat16
    chat_template: null      # uses Qwen3's bundled chat template
    trust_remote_code: true

# Shared training knobs (smaller batch + max_length than the Apertus grid because 32B).
common: &common_train_args
  num_max_steps: 1500
  batch_size: 1
  grad_accum: 8           # effective batch = 8
  ultrachat_samples: 5000
  limit_cb: 5000
  pair_limit: 100000
  pair_sample_size: 8000
  pair_sample_balanced: true
  max_length: 128         # halved from Apertus (256) to save activations memory
  lr: 0.0002
  jepa_target_encoder: defended
  align_layer: 50         # Qwen3-32B has 64 layers; mid-late ≈ 50
  jepa_target: prompt_only
  report_to: wandb
  save_total_limit: 1
  logging_steps: 10
  save_steps: 1500
  lora_r: 32
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: q_proj,v_proj
  pair_path: data/wildjailbreak_pairs.jsonl
  pair_format: wildjailbreak
  extra_benign_path: data/wildjailbreak_benign.jsonl
  extra_benign_samples: 5000
  include_pair_harmful_in_harm_ce: false
  w_benign: 0.1
  w_harm: 1.0
  w_kl: 1.0
  # PRA defaults overridden per cell (identity vs mlp).
  predictor_dropout: 0.0
  predictor_lr_multiplier: 1.0
  harm_ce_min: 5.0
  cb_beta_start_mult: 10.0
  cb_beta_decay_fraction: 1.0

defenses:
  # ----- Unprotected baseline (no train) -----
  q_base:
    script: null
    base_model: qwen3_32b
    output_subdir: q_base
    attack_uses_adapter: false

  # ----- CE-floor + identity PRA -----
  q_ce_pra_id:
    script: defenses/jepa_ce.py
    base_model: qwen3_32b
    output_subdir: q_ce_pra_id
    data: { cb_path: data/wildjailbreak_harmful.json }
    train_args:
      <<: *common_train_args
      harm_regularizer: ce_floor
      w_jepa: 5.0
      predictor_type: identity
      predictor_bottleneck_dim: 0

  # ----- CE-floor + MLP PRA (2 layers, bottleneck=256) -----
  q_ce_pra:
    script: defenses/jepa_ce.py
    base_model: qwen3_32b
    output_subdir: q_ce_pra
    data: { cb_path: data/wildjailbreak_harmful.json }
    train_args:
      <<: *common_train_args
      harm_regularizer: ce_floor
      w_jepa: 5.0
      predictor_type: mlp
      predictor_layers: 2
      predictor_bottleneck_dim: 256

  # ----- Circuit-breaker + identity PRA -----
  q_cb_pra_id:
    script: defenses/jepa_ce.py
    base_model: qwen3_32b
    output_subdir: q_cb_pra_id
    data: { cb_path: data/wildjailbreak_harmful.json }
    train_args:
      <<: *common_train_args
      harm_regularizer: circuit_breaker
      w_jepa: 5.0
      predictor_type: identity
      predictor_bottleneck_dim: 0

  # ----- Circuit-breaker + MLP PRA (2 layers, bottleneck=256) -----
  q_cb_pra:
    script: defenses/jepa_ce.py
    base_model: qwen3_32b
    output_subdir: q_cb_pra
    data: { cb_path: data/wildjailbreak_harmful.json }
    train_args:
      <<: *common_train_args
      harm_regularizer: circuit_breaker
      w_jepa: 5.0
      predictor_type: mlp
      predictor_layers: 2
      predictor_bottleneck_dim: 256

attacks:
  direct_100:
    attack: direct
    dataset: adv_behaviors_n100
  prefilling_100:
    attack: prefilling
    dataset: adv_behaviors_n100
  template_jb_100_n20:
    attack: template_jailbreak
    dataset: adv_behaviors_n100
    attack_overrides:
      num_templates: 20

benign_evals:
  mmlu_smoke:
    tasks: mmlu
    limit: 200

attack_priority:
  - direct_100
  - prefilling_100
  - template_jb_100_n20

pipelines:
  q_base:
    - { stage: attack, defense: q_base, attacks: [direct_100, prefilling_100, template_jb_100_n20] }
    - { stage: benign_eval, defense: q_base, benign_eval: mmlu_smoke }
  q_ce_pra_id:
    - { stage: train,  defense: q_ce_pra_id }
    - { stage: attack, defense: q_ce_pra_id, attacks: [direct_100, prefilling_100, template_jb_100_n20] }
    - { stage: benign_eval, defense: q_ce_pra_id, benign_eval: mmlu_smoke }
  q_ce_pra:
    - { stage: train,  defense: q_ce_pra }
    - { stage: attack, defense: q_ce_pra, attacks: [direct_100, prefilling_100, template_jb_100_n20] }
    - { stage: benign_eval, defense: q_ce_pra, benign_eval: mmlu_smoke }
  q_cb_pra_id:
    - { stage: train,  defense: q_cb_pra_id }
    - { stage: attack, defense: q_cb_pra_id, attacks: [direct_100, prefilling_100, template_jb_100_n20] }
    - { stage: benign_eval, defense: q_cb_pra_id, benign_eval: mmlu_smoke }
  q_cb_pra:
    - { stage: train,  defense: q_cb_pra }
    - { stage: attack, defense: q_cb_pra, attacks: [direct_100, prefilling_100, template_jb_100_n20] }
    - { stage: benign_eval, defense: q_cb_pra, benign_eval: mmlu_smoke }
