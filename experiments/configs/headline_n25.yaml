    - { stage: benign_eval, defense: q_cb_pra_withresp, benign_eval: mmlu_full }
    - { stage: benign_eval, defense: q_cb_pra_withresp, benign_eval: truthfulqa_full }
  q_triplet_pra_withresp:
    - { stage: train, defense: q_triplet_pra_withresp }
    - stage: attack
      defense: q_triplet_pra_withresp
      attacks: [bon_25, soft_prompt_25, pgd_25, inpainting_25, direct_100, prefilling_100, human_jailbreaks_100, or_bench_overrefusal]
    - { stage: benign_eval, defense: q_triplet_pra_withresp, benign_eval: gsm8k_full }
    - { stage: benign_eval, defense: q_triplet_pra_withresp, benign_eval: mmlu_full }
    - { stage: benign_eval, defense: q_triplet_pra_withresp, benign_eval: truthfulqa_full }
  # Reference cells: no train; just attack the model directly
  ref_l_base:
    - stage: attack
      defense: ref_l_base
      attacks: [bon_25, soft_prompt_25, pgd_25, inpainting_25, direct_100, prefilling_100, human_jailbreaks_100, or_bench_overrefusal]
    - { stage: benign_eval, defense: ref_l_base, benign_eval: gsm8k_full }
    - { stage: benign_eval, defense: ref_l_base, benign_eval: mmlu_full }
    - { stage: benign_eval, defense: ref_l_base, benign_eval: truthfulqa_full }
  ref_q_base:
    - stage: attack
      defense: ref_q_base
      attacks: [bon_25, soft_prompt_25, pgd_25, inpainting_25, direct_100, prefilling_100, human_jailbreaks_100, or_bench_overrefusal]
    - { stage: benign_eval, defense: ref_q_base, benign_eval: gsm8k_full }
    - { stage: benign_eval, defense: ref_q_base, benign_eval: mmlu_full }
    - { stage: benign_eval, defense: ref_q_base, benign_eval: truthfulqa_full }
  ref_l_grayswan_rr:
    - stage: attack
      defense: ref_l_grayswan_rr
      attacks: [bon_25, soft_prompt_25, pgd_25, inpainting_25, direct_100, prefilling_100, human_jailbreaks_100, or_bench_overrefusal]
    - { stage: benign_eval, defense: ref_l_grayswan_rr, benign_eval: gsm8k_full }
    - { stage: benign_eval, defense: ref_l_grayswan_rr, benign_eval: mmlu_full }
    - { stage: benign_eval, defense: ref_l_grayswan_rr, benign_eval: truthfulqa_full }
  ref_l_simko_triplet:
    - stage: attack
      defense: ref_l_simko_triplet
      attacks: [bon_25, soft_prompt_25, pgd_25, inpainting_25, direct_100, prefilling_100, human_jailbreaks_100, or_bench_overrefusal]
    - { stage: benign_eval, defense: ref_l_simko_triplet, benign_eval: gsm8k_full }
    - { stage: benign_eval, defense: ref_l_simko_triplet, benign_eval: mmlu_full }
    - { stage: benign_eval, defense: ref_l_simko_triplet, benign_eval: truthfulqa_full }
  ref_l_lat:
    - stage: attack
      defense: ref_l_lat
      attacks: [bon_25, soft_prompt_25, pgd_25, inpainting_25, direct_100, prefilling_100, human_jailbreaks_100, or_bench_overrefusal]
    - { stage: benign_eval, defense: ref_l_lat, benign_eval: gsm8k_full }
    - { stage: benign_eval, defense: ref_l_lat, benign_eval: mmlu_full }
    - { stage: benign_eval, defense: ref_l_lat, benign_eval: truthfulqa_full }
attack_priority: [direct_100, prefilling_100, human_jailbreaks_100, or_bench_overrefusal, bon_25, inpainting_25, soft_prompt_25, pgd_25]
